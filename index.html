<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEANIC IT · Quản lý vòng đời thiết bị</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase (Auth + Firestore) — nếu không tải được (mất mạng/CDN bị chặn), app tự chuyển sang chế độ cục bộ (xem Store bên dưới) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<!-- SheetJS: đọc/ghi thật file Excel (.xlsx/.xls) và CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- JsBarcode + QRCode: sinh mã vạch & mã QR cho tem tài sản phục vụ kiểm kê -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --ink:#14181F; --ink-soft:#4B5563; --paper:#F3F5F8; --surface:#FFFFFF;
  --line:#DDE2E8; --line-soft:#EAEDF2;
  --brand:#1B5A96; --brand-dark:#113F6B; --brand-tint:#E6F0FA;
  --amber:#B4740D; --amber-tint:#FBF0DD;
  --rust:#AF3B24; --rust-tint:#FBE7E1;
  --slate:#5B6470; --slate-tint:#E7EAEC;
  --radius:10px;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}

/* ---------- Login ---------- */
#login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,var(--ink),#1f2733);z-index:100;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);padding:36px 34px;border-radius:14px;width:360px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.35);}
.login-box h3{font-family:var(--font-display);margin:0 0 4px;font-size:19px;}
.login-box .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;}
.login-box .err{background:var(--rust-tint);color:var(--rust);font-size:12.5px;padding:9px 11px;border-radius:8px;margin-bottom:12px;display:none;}
.login-box .err.show{display:block;}
.login-mode{display:flex;gap:10px;justify-content:center;margin-top:14px;font-size:12px;color:var(--ink-soft);}
.login-mode button{background:none;border:none;color:var(--brand);cursor:pointer;font-weight:600;font-size:12px;padding:0;}

/* ---------- Layout shell ---------- */
#shell{display:flex;min-height:100vh;}
#sidebar{width:250px;flex:none;background:var(--ink);color:#EDEFEC;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
#sidebar .brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.09);display:flex;gap:10px;align-items:center;}
#sidebar .brand .logo-ph{width:34px;height:34px;border-radius:8px;background:var(--brand);color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex:none;}
#sidebar .brand .tt{min-width:0;}
#sidebar .brand .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:#8FAFCB;text-transform:uppercase;}
#sidebar .brand h1{font-family:var(--font-display);font-size:15px;line-height:1.25;margin:0;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
nav.main-nav{padding:14px 10px;flex:1;overflow-y:auto;}
nav.main-nav .grp-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7B848C;padding:14px 12px 6px;}
nav.main-nav button{width:100%;text-align:left;background:none;border:none;color:#CBD1D6;font-family:var(--font-body);font-size:13.5px;font-weight:500;padding:9px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:2px;transition:background .12s,color .12s;}
nav.main-nav button .ico{font-family:var(--font-mono);font-size:11px;width:18px;text-align:center;color:#7B848C;flex:none;}
nav.main-nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
nav.main-nav button.active{background:var(--brand);color:#fff;}
nav.main-nav button.active .ico{color:#CFE1F5;}
#sidebar .foot{padding:12px 20px;border-top:1px solid rgba(255,255,255,.09);font-size:11px;color:#9AA3AC;}
#sidebar .foot .mode-local{color:#E7B65C;}

/* body role hiding — không dùng JS chèn style động (tránh lỗi), dùng class cố định trên <body> */
body.role-user .admin-only{display:none !important;}

#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:5;flex-wrap:wrap;}
#topbar h2{font-family:var(--font-display);font-size:19px;margin:0;font-weight:600;}
#topbar .desc{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
#topbarRight{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
#content{padding:26px 28px 60px;max-width:1220px;width:100%;margin:0 auto;}

.btn{font-family:var(--font-body);font-size:13px;font-weight:600;border-radius:8px;padding:9px 15px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap;}
.btn:hover{border-color:var(--ink);}
.btn-brand{background:var(--brand);border-color:var(--brand);color:#fff;}
.btn-brand:hover{background:var(--brand-dark);border-color:var(--brand-dark);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn-ghost:hover{background:var(--line-soft);color:var(--ink);}
.btn-danger{color:var(--rust);}
.btn-danger:hover{border-color:var(--rust);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.grid-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px;}
.stat-card .n{font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1;}
.stat-card .l{font-size:11.5px;color:var(--ink-soft);margin-top:7px;font-weight:500;}
.stat-card.accent-brand .n{color:var(--brand);}
.stat-card.accent-slate .n{color:var(--slate);}
.stat-card.accent-amber .n{color:var(--amber);}
.stat-card.accent-rust .n{color:var(--rust);}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;}
.panel h3{font-family:var(--font-display);font-size:15px;margin:0 0 14px;font-weight:600;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.panel-head h3{margin:0;}
.panel.dashed{border-style:dashed;background:var(--paper);}

.tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:12.5px;font-weight:600;background:var(--ink);color:#EDEFEC;padding:4px 8px 4px 6px;border-radius:5px;letter-spacing:.02em;}
.tag .bars{display:flex;gap:1.5px;align-items:flex-end;height:11px;}
.tag .bars i{display:block;width:2px;background:#7FA9D6;}
.tag .bars i:nth-child(1){height:100%;} .tag .bars i:nth-child(2){height:60%;} .tag .bars i:nth-child(3){height:85%;} .tag .bars i:nth-child(4){height:45%;} .tag .bars i:nth-child(5){height:100%;}

table.data{width:100%;border-collapse:collapse;font-size:13px;}
table.data th{text-align:left;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;padding:0 12px 10px;border-bottom:1px solid var(--line);}
table.data td{padding:12px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
table.data tr:last-child td{border-bottom:none;}
table.data tr.rowclick{cursor:pointer;}
table.data tr.rowclick:hover{background:var(--brand-tint);}
table.data tr.row-error{background:var(--rust-tint);}
table.data tr.row-update{background:var(--amber-tint);}
.cell-title{font-weight:600;font-size:13.5px;}
.cell-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;white-space:nowrap;}
.pill-brand{background:var(--brand-tint);color:var(--brand-dark);}
.pill-slate{background:var(--slate-tint);color:var(--slate);}
.pill-amber{background:var(--amber-tint);color:var(--amber);}
.pill-rust{background:var(--rust-tint);color:var(--rust);}

.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input, .field select, .field textarea{width:100%;font-family:var(--font-body);font-size:13.5px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand);}
.field textarea{resize:vertical;min-height:64px;font-family:var(--font-body);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
.req::after{content:' *';color:var(--rust);}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input[type=search]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-family:var(--font-body);font-size:13px;background:var(--surface);}
.toolbar select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--surface);font-family:var(--font-body);}

#modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;background:rgba(20,24,31,.45);overflow-y:auto;padding:40px 16px;}
#modal-root.open{display:flex;}
.modal-box{background:var(--surface);border-radius:12px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-family:var(--font-display);font-size:16px;margin:0;font-weight:600;}
.modal-body{padding:20px 22px;max-height:64vh;overflow-y:auto;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
.x-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-soft);line-height:1;}

.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:1.5px;background:var(--line);}
.tl-item{position:relative;padding-bottom:18px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{content:'';position:absolute;left:-22px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--brand);}
.tl-date{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);}
.tl-label{font-weight:600;font-size:13.5px;margin:2px 0 3px;}
.tl-detail{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}

.empty{text-align:center;padding:44px 20px;color:var(--ink-soft);}
.empty .big{font-family:var(--font-mono);font-size:28px;color:var(--line);margin-bottom:10px;}
.empty p{font-size:13px;margin:4px 0 14px;}

#toast-wrap{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);}
.toast.err{background:var(--rust);}

.detail-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start;}
.kv{display:grid;grid-template-columns:150px 1fr;gap:6px 10px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line-soft);}
.kv b{color:var(--ink-soft);font-weight:500;font-size:12px;}
.specs-box{font-size:12.5px;line-height:1.6;color:var(--ink-soft);background:var(--paper);border-radius:8px;padding:12px 13px;white-space:pre-wrap;}

.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .12s;text-align:left;}
.tile:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:0 6px 16px rgba(27,90,150,.12);}
.tile .ico{font-family:var(--font-mono);font-size:11px;color:var(--brand);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.tile h4{font-family:var(--font-display);font-size:15px;margin:0 0 5px;font-weight:600;}
.tile p{font-size:12px;color:var(--ink-soft);margin:0;line-height:1.5;}

.upload-drop{border:1.5px dashed var(--line);border-radius:10px;padding:20px;text-align:center;background:var(--paper);}
.upload-drop input[type=file]{margin-top:8px;}

@media(max-width:980px){
  .grid-stats{grid-template-columns:repeat(2,1fr);}
  .tiles{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
}
@media(max-width:760px){
  #sidebar{display:none;}
  #content{padding:18px 14px 60px;}
  #topbar{padding:14px 16px;}
}

#print-area{display:none;}
/* Thanh điều khiển nổi trên màn hình khi xem biên bản */
.print-toolbar { background: #14181F; padding: 12px 24px; display: flex; gap: 12px; justify-content: center; position: sticky; top: 0; z-index: 9999; border-bottom: 1px solid var(--line); }
@media print{
  @page{ size:A4 portrait; margin:12mm; }
  #shell, #login-overlay, #modal-root, #toast-wrap, .print-toolbar{display:none !important;}
  #print-area{display:block !important;}
  body{background:#fff;}
  .bb-page{ page-break-after:avoid; page-break-inside:avoid; }
  .label-sheet{ page-break-after:always; }
  .label-sheet:last-child{ page-break-after:auto; }
}
/* ---------- Trang in: khổ A4 dọc, 1 trang ---------- */
.bb-page{max-width:760px;margin:0 auto;font-family:var(--font-body);font-size:13px;color:#111;padding:20px;box-sizing:border-box;min-height:273mm;}
.bb-head{text-align:center;margin-bottom:16px;}
.bb-head .co{font-weight:700;font-size:14px;}
.bb-head .dept{font-size:12.5px;color:#444;}
.bb-head h1{font-family:var(--font-display);font-size:19px;margin:10px 0 4px;}
.bb-row{display:flex;gap:18px;margin:10px 0;font-size:13px;}
.bb-block{margin:14px 0;}
.bb-block h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:8px;}
table.bb-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px;}
table.bb-table th,table.bb-table td{border:1px solid #999;padding:6px 8px;text-align:left;}
table.bb-table th{background:#f0f0f0;}
.bb-terms{font-size:11.5px;line-height:1.7;color:#222;margin-top:14px;}
.bb-sign{display:flex;justify-content:space-between;margin-top:34px;text-align:center;}
.bb-sign div{width:45%;}
.bb-sign .cap{font-size:12px;font-weight:600;}
.bb-sign .sub{font-size:11px;color:#555;font-style:italic;margin-bottom:50px;}

/* ---------- Tem tài sản (mã vạch / QR) — phục vụ kiểm kê ---------- */
.label-sheet{width:186mm;margin:0 auto;font-family:var(--font-body);color:#111;}
.label-sheet .ls-head{text-align:center;margin-bottom:8mm;}
.label-sheet .ls-head .co{font-weight:700;font-size:13px;}
.label-sheet .ls-head h1{font-family:var(--font-display);font-size:16px;margin:4px 0 0;}
.label-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5mm;}
.label-card{border:1px solid #999;border-radius:3mm;padding:4mm 4mm 3mm;display:flex;flex-direction:column;align-items:center;text-align:center;break-inside:avoid;}
.label-card .lc-co{font-size:9.5px;font-weight:700;letter-spacing:.03em;}
.label-card .lc-id{font-family:var(--font-mono);font-size:15px;font-weight:700;margin:2px 0 4px;}
.label-card .lc-name{font-size:11px;font-weight:600;line-height:1.3;}
.label-card .lc-sub{font-size:9.5px;color:#444;margin:1px 0 4px;}
.label-card .lc-codes{display:flex;align-items:center;justify-content:center;gap:6mm;margin-top:2px;}
.label-card .lc-qr{flex:none;}
.label-card svg.lc-barcode{max-width:100%;}
.solo-card{border:1px solid #999;border-radius:4mm;padding:14mm 10mm;display:flex;flex-direction:column;align-items:center;text-align:center;}
.solo-card .lc-co{font-size:12px;}
.solo-card .lc-id{font-size:30px;margin:6px 0 10px;}
.solo-card .lc-name{font-size:16px;}
.solo-card .lc-sub{font-size:12.5px;margin-bottom:16px;}
.solo-card .solo-kv{font-size:12px;color:#333;text-align:left;width:100%;max-width:320px;margin:4px 0;display:flex;justify-content:space-between;border-bottom:1px dotted #ccc;padding-bottom:3px;}
.solo-card .lc-codes{margin-top:16px;gap:12mm;}
.label-actions{display:flex;gap:8px;align-items:center;}
.chk-col{width:30px;text-align:center;}

/* ---------- Tem khổ máy in nhiệt (thermal) ---------- */
.thermal-page{box-sizing:border-box;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:var(--font-mono);overflow:hidden;page-break-after:always;}
.thermal-page.last{page-break-after:auto;}
.thermal-page .th-co{font-size:7px;font-weight:700;letter-spacing:.03em;line-height:1.1;}
.thermal-page .th-id{font-family:var(--font-mono);font-weight:700;font-size:13px;line-height:1.2;margin:0.8mm 0 0;}
.thermal-page .th-name{font-size:7px;line-height:1.15;margin:0.5mm 0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.thermal-page svg.th-barcode{max-width:100%;}
.thermal-page .th-qr{margin-top:0.8mm;}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h3>JEANIC IT · Đăng nhập</h3>
    <div class="sub">Quản lý vòng đời thiết bị CNTT</div>
    <div class="err" id="loginErr"></div>
    <div class="field"><label>Email nội bộ</label><input type="email" id="loginEmail" placeholder="ban@jeanicgarment.com"></div>
    <div class="field"><label>Mật khẩu</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn btn-brand" style="width:100%;justify-content:center;" onclick="app.login()">Đăng nhập</button>
    <div class="login-mode" id="localModeNote" style="display:none;">Đang chạy ở chế độ cục bộ (không có máy chủ) — <button onclick="app.enterLocalMode()">Vào thẳng không cần đăng nhập</button></div>
  </div>
</div>

<div id="shell" style="display:none;">
  <aside id="sidebar">
    <div class="brand">
      <div class="logo-ph">JT</div>
      <div class="tt">
        <div class="tag">Jeanic Garment Solutions</div>
        <h1>Vòng đời thiết bị</h1>
      </div>
    </div>
    <nav class="main-nav" id="mainNav"></nav>
    <div class="foot" id="sidebarFoot"><span class="dot">●</span> Đang tải…</div>
  </aside>

  <div id="main">
    <div id="topbar">
      <div>
        <h2 id="pageTitle">Tổng quan</h2>
        <div class="desc" id="pageDesc">Tình trạng thiết bị CNTT toàn công ty</div>
      </div>
      <div id="topbarRight">
        <div id="topbarActions" style="display:flex;gap:10px;"></div>
        <span class="pill pill-brand" id="currentUserRole">—</span>
        <button class="btn btn-sm" onclick="app.logout()">Đăng xuất</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-root"><div class="modal-box" id="modalBox"></div></div>
<div id="toast-wrap"></div>
<div id="print-area"></div>

<script>

const Store = {
  mode: useFirebase ? "cloud" : "local",
  async get(key){
    if(this.mode==="cloud"){
      try{
        const doc = await db.collection("jeanic_data").doc(key).get();
        return doc.exists ? {value:doc.data().dataString} : null;
      }catch(e){ console.error(e); return null; }
    }
    try{ const v = localStorage.getItem("jeanic-"+key); return v===null?null:{value:v}; }
    catch(e){ return null; }
  },
  async set(key, value){
    if(this.mode==="cloud"){
      try{ await db.collection("jeanic_data").doc(key).set({dataString:value, updatedAt:new Date().toISOString()}); return true; }
      catch(e){ console.error(e); return false; }
    }
    try{ localStorage.setItem("jeanic-"+key, value); return true; }
    catch(e){ return false; }
  }
};

    state.meta = JSON.parse(m.value);
    state.settings = s ? {...DEFAULT_SETTINGS, ...JSON.parse(s.value)} : {...DEFAULT_SETTINGS};
  } else {
    seedDefaults();
    await persistAll();
  }
  state.loaded = true;
}

/* ---------- GLOBAL AUDIT LOG SYSTEM ---------- */
async function saveGlobalLog(opType, deviceId, logEntry, printPayload) {
  const globalLog = {
    deviceId: deviceId,
    type: opType,
    date: new Date().toISOString(),
    by: currentUser?.email || "local",
    detail: logEntry,
    printData: printPayload || null
  };
  if (Store.mode === "cloud") {
    try { await db.collection("jeanic_audit_logs").add(globalLog); } catch (e) { console.error("Lỗi lưu global log:", e); }
  } else {
    let localLogs = [];
    try {
      const stored = localStorage.getItem("jeanic-global-logs");
      if (stored) localLogs = JSON.parse(stored);
    } catch (e) {}
    localLogs.unshift(globalLog);
    localStorage.setItem("jeanic-global-logs", JSON.stringify(localLogs));
  }
}

function pad3(n){ return String(n).padStart(3,"0"); }
function nextDeviceId(){ return "TB" + pad3(state.meta.deviceSeq); }
function nextEmployeeId(){ return "NV" + pad3(state.meta.employeeSeq); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); if(isNaN(d)) return String(iso); return d.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function fmtDateTime(iso){ const d=new Date(iso); if(isNaN(d)) return String(iso); return d.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}); }
function esc(s){ return (s===undefined||s===null)?"":String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtVND(n){ if(n===null||n===undefined||n===""||isNaN(n)) return "—"; return Math.round(Number(n)).toLocaleString("vi-VN")+" ₫"; }
function monthsBetween(a,b){ let m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth()); if(b.getDate()<a.getDate()) m-=1; return m; }

function computeDepreciation(d){
  const price = Number(d.purchasePrice)||0;
  const salvage = Number(d.salvageValue)||0;
  const lifeYears = Number(d.usefulLifeYears) || state.settings.usefulLifeYears;
  const lifeMonths = Math.max(1, Math.round(lifeYears*12));
  if(!d.purchaseDate || price<=0){
    return {hasData:false, price:0, bookValue:null, percentUsed:0, monthsElapsed:0, lifeMonths, monthlyDep:0, accumDep:0};
  }
  const start = new Date(d.purchaseDate);
  const now = new Date();
  let monthsElapsed = monthsBetween(start, now);
  monthsElapsed = Math.max(0, Math.min(monthsElapsed, lifeMonths));
  const depreciableAmount = Math.max(0, price-salvage);
  const monthlyDep = depreciableAmount/lifeMonths;
  const accumDep = monthlyDep*monthsElapsed;
  const bookValue = Math.max(salvage, price-accumDep);
  const percentUsed = lifeMonths>0 ? Math.min(100, Math.round((monthsElapsed/lifeMonths)*100)) : 0;
  return {hasData:true, price, salvage, lifeMonths, monthsElapsed, monthlyDep, accumDep, bookValue, percentUsed};
}
function warrantyInfo(d){
  if(!d.purchaseDate || !d.warrantyMonths) return {hasData:false};
  const start = new Date(d.purchaseDate);
  const end = new Date(start);
  end.setMonth(end.getMonth()+(Number(d.warrantyMonths)||0));
  const now = new Date();
  const daysLeft = Math.round((end-now)/86400000);
  return {hasData:true, end, daysLeft, expired:daysLeft<0, endISO:end.toISOString().slice(0,10)};
}
function repairTotal(d){ return (d.repairs||[]).reduce((s,r)=>s+(Number(r.cost)||0),0); }
function computeAlerts(){
  const alerts = [];
  state.devices.forEach(d=>{
    if(d.status==="Thanh lý") return;
    const dep = computeDepreciation(d);
    const war = warrantyInfo(d);
    const rTotal = repairTotal(d);
    if(war.hasData && !war.expired && war.daysLeft<=state.settings.warrantyWarnDays){
      alerts.push({device:d, kind:"warranty", text:`Sắp hết bảo hành (còn ${war.daysLeft} ngày)`});
    } else if(war.hasData && war.expired && war.daysLeft>=-state.settings.warrantyWarnDays){
      alerts.push({device:d, kind:"warranty-expired", text:`Đã hết bảo hành ${Math.abs(war.daysLeft)} ngày trước`});
    }
    if(dep.hasData){
      if((100-dep.percentUsed)<=state.settings.depreciationWarnPercent){
        alerts.push({device:d, kind:"depreciation", text:`Đã khấu hao ${dep.percentUsed}% — giá trị còn lại thấp`});
      }
      if(dep.price>0 && rTotal>=dep.price*state.settings.repairCostWarnPercent/100){
        alerts.push({device:d, kind:"repair-cost", text:`Chi phí sửa chữa luỹ kế ${fmtVND(rTotal)} — cân nhắc thanh lý`});
      }
    }
  });
  return alerts;
}
function downloadFile(content, filename, mime){
  const blob = (content instanceof Blob) ? content : new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

async function resolveRole(user){
  // Tài khoản trong danh sách ADMIN_EMAILS luôn là admin (tự "chữa lành" nếu chưa có hồ sơ)
  const isHardAdmin = ADMIN_EMAILS.includes((user.email||"").toLowerCase());
  if(Store.mode!=="cloud"){ return {role: isHardAdmin?"admin":"admin", active:true}; } // cục bộ: 1 mình dùng, coi như admin
  try{
    const doc = await db.collection("jeanic_accounts").doc(user.uid).get();
    if(doc.exists){
      const data = doc.data();
      if(data.active===false) return {role:data.role||"user", active:false};
      return {role:data.role || (isHardAdmin?"admin":"user"), active:true};
    }
    // Chưa có hồ sơ tài khoản trong Firestore (vd. tài khoản admin đầu tiên tạo trực tiếp trong Firebase Console)
    if(isHardAdmin){
      await db.collection("jeanic_accounts").doc(user.uid).set({
        email:user.email, role:"admin", employeeId:null, active:true, createdAt:new Date().toISOString(), createdBy:"system"
      });
      return {role:"admin", active:true};
    }
    return {role:"user", active:true};
  }catch(e){
    console.error(e);
    return {role: isHardAdmin?"admin":"user", active:true};
  }
}
function applyRoleUI(){
  document.body.classList.toggle("role-user", currentRole!=="admin");
  document.getElementById("currentUserRole").textContent = currentRole==="admin" ? "QUẢN TRỊ" : "NGƯỜI DÙNG";

}

function renderDashboard(){
  const total = state.devices.length;
  const byStatus = {};
  state.devices.forEach(d=>byStatus[d.status]=(byStatus[d.status]||0)+1);
  const recent = [];
  state.devices.forEach(d=>(d.history||[]).forEach(h=>recent.push({...h, deviceId:d.id, deviceType:d.type})));
  recent.sort((a,b)=>new Date(b.date)-new Date(a.date));
  let totalInvested=0, totalBookValue=0;
  state.devices.forEach(d=>{ const dep=computeDepreciation(d); if(dep.hasData){ totalInvested+=dep.price; totalBookValue+=dep.bookValue; } });
  const alerts = computeAlerts();

  document.getElementById("content").innerHTML = `
    <div class="grid-stats">
      <div class="stat-card"><div class="n">${total}</div><div class="l">Tổng thiết bị</div></div>
      <div class="stat-card accent-brand"><div class="n">${byStatus["Đang sử dụng"]||0}</div><div class="l">Đang sử dụng</div></div>
      <div class="stat-card accent-slate"><div class="n">${byStatus["Trong kho"]||0}</div><div class="l">Trong kho</div></div>
      <div class="stat-card accent-amber"><div class="n">${byStatus["Bảo trì"]||0}</div><div class="l">Đang bảo trì</div></div>
      <div class="stat-card accent-rust"><div class="n">${byStatus["Thanh lý"]||0}</div><div class="l">Đã thanh lý</div></div>
    </div>
    <div class="grid-stats" style="grid-template-columns:repeat(3,1fr);">

/* =========================================================
   THIẾT BỊ
========================================================= */
let deviceFilter = {q:"", status:"all", dept:"all"};
let selectedForLabel = new Set();
function renderDevices(){
  document.getElementById("topbarActions").innerHTML = `
    <button class="btn" onclick="app.printSelectedLabels()">🏷️ In tem đã chọn (${selectedForLabel.size})</button>
    <button class="btn btn-brand" onclick="app.openDeviceForm()">+ Thêm thiết bị</button>`;
  const q = deviceFilter.q.toLowerCase();
  const list = state.devices.filter(d=>{
    if(deviceFilter.status!=="all" && d.status!==deviceFilter.status) return false;
    if(deviceFilter.dept!=="all" && d.dept!==deviceFilter.dept) return false;
    if(q && !(`${d.id} ${d.type} ${d.brand} ${d.holderName||""}`.toLowerCase().includes(q))) return false;
    return true;
  });
  // dọn lựa chọn tem khỏi các thiết bị không còn tồn tại
  [...selectedForLabel].forEach(id=>{ if(!state.devices.some(d=>d.id===id)) selectedForLabel.delete(id); });
  const allChecked = list.length>0 && list.every(d=>selectedForLabel.has(d.id));
  const alertIds = new Set(computeAlerts().map(a=>a.device.id));
  document.getElementById("content").innerHTML = `
    <div class="toolbar">
      <input type="search" placeholder="Tìm theo mã TB, loại, thương hiệu, người dùng…" value="${esc(deviceFilter.q)}" oninput="app.setDeviceFilter('q', this.value)">
      <select onchange="app.setDeviceFilter('status', this.value)">
        <option value="all">Tất cả trạng thái</option>
        ${Object.keys(STATUS_META).map(s=>`<option value="${s}" ${deviceFilter.status===s?'selected':''}>${s}</option>`).join("")}
      </select>
      <select onchange="app.setDeviceFilter('dept', this.value)">
        <option value="all">Tất cả bộ phận</option>
        ${DEPARTMENTS.map(dp=>`<option value="${dp}" ${deviceFilter.dept===dp?'selected':''}>${dp}</option>`).join("")}
      </select>
    </div>
    <div class="panel" style="padding:14px 0 4px;">
      ${list.length===0 ? emptyState("Không tìm thấy thiết bị","Thử đổi bộ lọc, hoặc thêm thiết bị mới.") : `
      <table class="data">
        <tr><th class="chk-col"><input type="checkbox" ${allChecked?'checked':''} onclick="event.stopPropagation();app.toggleLabelSelectAll(this.checked)"></th><th style="padding-left:6px;">Mã TB</th><th>Loại / Thương hiệu</th><th>Tình trạng</th><th>Trạng thái</th><th>Người dùng</th><th>Bộ phận</th><th></th><th></th></tr>
        ${list.map(d=>`
          <tr class="rowclick" onclick="app.setView('device','${d.id}')">
            <td class="chk-col" onclick="event.stopPropagation();"><input type="checkbox" ${selectedForLabel.has(d.id)?'checked':''} onchange="app.toggleLabelSelect('${d.id}', this.checked)"></td>
            <td><b>${esc(d.id)}</b></td>
            <td><div class="cell-title">${esc(d.type)}</div><div class="cell-sub">${esc(d.brand)}</div></td>
            <td>${esc(d.condition)}</td>
            <td><span class="pill ${STATUS_META[d.status]?.pill||'pill-slate'}">${esc(d.status)}</span></td>
            <td>${esc(d.holderName||"—")}</td>
            <td>${esc(d.dept||"—")}</td>
            <td>${alertIds.has(d.id)?'<span class="pill pill-rust">⚠ Chú ý</span>':""}</td>
            <td onclick="event.stopPropagation();"><button class="btn btn-sm" onclick="app.printAssetLabel('${d.id}')">🏷️ In tem</button></td>
          </tr>`).join("")}
      </table>`}
    </div>
  `;
}
function setDeviceFilter(k,v){ deviceFilter[k]=v; renderDevices(); }
function toggleLabelSelect(id, checked){ if(checked) selectedForLabel.add(id); else selectedForLabel.delete(id); renderDevices(); }
function toggleLabelSelectAll(checked){
  const q = deviceFilter.q.toLowerCase();
  const list = state.devices.filter(d=>{
    if(deviceFilter.status!=="all" && d.status!==deviceFilter.status) return false;
    if(deviceFilter.dept!=="all" && d.dept!==deviceFilter.dept) return false;
    if(q && !(`${d.id} ${d.type} ${d.brand} ${d.holderName||""}`.toLowerCase().includes(q))) return false;
    return true;
  });
  list.forEach(d=> checked ? selectedForLabel.add(d.id) : selectedForLabel.delete(d.id));
  renderDevices();
}
function printSelectedLabels(){
  if(selectedForLabel.size===0){ toast("Vui lòng chọn ít nhất 1 thiết bị để in tem", true); return; }
  openLabelPrintOptions([...selectedForLabel]);
}
function printAssetLabel(id){ openLabelPrintOptions([id]); }

/* ---------- Hộp thoại chọn khổ tem trước khi in ---------- */
let _labelPrintIds = [];
function openLabelPrintOptions(ids){
  if(!ids || ids.length===0){ toast("Vui lòng chọn ít nhất 1 thiết bị để in tem", true); return; }
  _labelPrintIds = ids;
  openModal("In tem thiết bị ("+ids.length+")", `
    <div class="field">
      <label>Khổ giấy / máy in</label>
      <select id="lblPrintMode" onchange="app.toggleCustomLabelSize()">
        <option value="a4">Giấy A4 thường — nhiều tem/trang, có mã vạch + QR</option>
        <option value="th50x30">Máy in nhiệt — tem 50 x 30 mm</option>
        <option value="th40x30">Máy in nhiệt — tem 40 x 30 mm</option>
        <option value="th30x20">Máy in nhiệt — tem 30 x 20 mm (chỉ mã vạch)</option>
        <option value="custom">Máy in nhiệt — kích thước tuỳ chỉnh…</option>
      </select>
    </div>
    <div id="customLabelSize" style="display:none;">
      <div class="field-row">
        <div class="field"><label>Chiều rộng (mm)</label><input type="number" min="15" max="120" step="1" id="lblCustomW" value="50"></div>
        <div class="field"><label>Chiều cao (mm)</label><input type="number" min="10" max="120" step="1" id="lblCustomH" value="30"></div>
      </div>
      <div class="hint">Nhập đúng kích thước tem thật đang lắp trong máy in. QR và mã vạch sẽ tự động co giãn theo kích thước bạn nhập. Tem có diện tích quá nhỏ (dưới khoảng 40×25mm) sẽ tự động chỉ hiện mã vạch.</div>
    </div>
    <div class="hint">Chọn đúng khổ tem đang lắp trong máy in nhiệt (Xprinter, Zebra…) để không bị lệch tem. QR và thông tin trên tem sẽ tự co giãn theo đúng kích thước đã chọn. Với tem quá nhỏ, tem chỉ hiện mã vạch do diện tích không đủ cho QR.</div>
  `, `<button class="btn" onclick="app.closeModal()">Huỷ</button><button class="btn btn-brand" onclick="app.confirmPrintLabels()">In tem</button>`);
}
function toggleCustomLabelSize(){
  const mode = document.getElementById("lblPrintMode").value;
  document.getElementById("customLabelSize").style.display = mode==="custom" ? "block" : "none";
}
function confirmPrintLabels(){
  let mode = document.getElementById("lblPrintMode").value;
  if(mode==="custom"){
    const w = Math.round(Number(document.getElementById("lblCustomW").value)||50);
    const h = Math.round(Number(document.getElementById("lblCustomH").value)||30);
    mode = `th${w}x${h}`;
  }
  const ids = _labelPrintIds;
  closeModal();
  setTimeout(()=>renderAssetLabels(ids, mode), 150);
}

      <div class="kv"><b>Thời gian khấu hao</b><span>${(d.usefulLifeYears||state.settings.usefulLifeYears)} năm</span></div>

      <div style="margin-top:8px;background:var(--line-soft);border-radius:6px;height:8px;overflow:hidden;">
        <div style="width:${dep.percentUsed}%;height:100%;background:${(100-dep.percentUsed)<=state.settings.depreciationWarnPercent?'var(--rust)':'var(--brand)'};"></div>

      <div class="kv" style="margin-top:8px;"><b>Tổng chi phí sửa chữa</b><span>${fmtVND(rTotal)}${dep.price>0 && rTotal>=dep.price*state.settings.repairCostWarnPercent/100 ? ` <span class="pill pill-rust">Cao — cân nhắc thanh lý</span>`:""}</span></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Lịch sử sửa chữa</h3><button class="btn btn-sm" onclick="app.openOpForm('sua_chua','${d.id}')">+ Ghi nhận</button></div>
      ${(d.repairs&&d.repairs.length) ? `
      <table class="data"><tr><th>Ngày</th><th>Đơn vị sửa</th><th>Mô tả</th><th>Chi phí</th></tr>
      ${[...d.repairs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>`

        <td>${esc(r.vendor||"—")}</td><td class="cell-sub">${esc(r.description||"")}</td><td>${fmtVND(r.cost)}</td></tr>`).join("")}

  document.getElementById("content").innerHTML = `

          <div class="kv"><b>Loại thiết bị</b><span>${esc(d.type)}</span></div>
          <div class="kv"><b>Thương hiệu</b><span>${esc(d.brand)}</span></div>

function eventDetailLine(h){
  if(h.type==="ban_giao") return `Giao cho <b>${esc(h.to||"")}</b> (${esc(h.dept||"")}) — tình trạng: ${esc(h.condition||"")}`;
  if(h.type==="thu_hoi") return `Thu hồi từ <b>${esc(h.from||"")}</b> — tình trạng: ${esc(h.condition||"")} — lý do: ${esc(h.reason||"—")}`;
  if(h.type==="dieu_chuyen") return `Điều chuyển từ <b>${esc(h.from||"")}</b> sang <b>${esc(h.to||"")}</b> (${esc(h.dept||"")})`;
  if(h.type==="bao_tri_bat_dau") return `Gửi bảo trì — lý do: ${esc(h.reason||"—")}`;
  if(h.type==="bao_tri_xong") return `Hoàn tất bảo trì, nhập lại kho — tình trạng: ${esc(h.condition||"")}`;
  if(h.type==="thanh_ly") return `Lý do: ${esc(h.reason||"—")}`;
  if(h.type==="sua_chua") return `${esc(h.reason||"Sửa chữa")}${h.vendor?` — tại ${esc(h.vendor)}`:""} — chi phí ${fmtVND(h.cost)}`;
  if(h.type==="cap_nhat") return (h.changes&&h.changes.length) ? h.changes.map(c=>esc(c)).join("<br>") : "Cập nhật thông tin thiết bị";
  return esc(h.note||"");
}

const DEVICE_FIELD_LABELS = {
  type:"Loại thiết bị", brand:"Thương hiệu", specs:"Thông số kỹ thuật", condition:"Tình trạng",
  importDate:"Ngày nhập kho", note:"Ghi chú", purchaseDate:"Ngày mua", purchasePrice:"Giá mua",
  vendor:"Nhà cung cấp", invoiceNo:"Số hoá đơn", usefulLifeYears:"Thời gian khấu hao (năm)",
  warrantyMonths:"Bảo hành (tháng)", salvageValue:"Giá trị thanh lý"
};
function newHistoryUid(){ return "H"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
async function saveDevice(id){
  const type = document.getElementById("fType").value.trim();
  const brand = document.getElementById("fBrand").value.trim();
  if(!type || !brand){ toast("Vui lòng nhập Loại thiết bị và Thương hiệu", true); return; }
  const specs = document.getElementById("fSpecs").value.trim();
  const condition = document.getElementById("fCondition").value;
  const importDate = document.getElementById("fImportDate").value;
  const note = document.getElementById("fNote").value.trim();
  const purchaseDate = document.getElementById("fPurchaseDate").value || "";
  const purchasePrice = Number(document.getElementById("fPurchasePrice").value) || 0;
  const vendor = document.getElementById("fVendor").value.trim();
  const invoiceNo = document.getElementById("fInvoiceNo").value.trim();
  const usefulLifeYears = Number(document.getElementById("fUsefulLifeYears").value) || state.settings.usefulLifeYears;
  const warrantyMonths = Number(document.getElementById("fWarrantyMonths").value) || 0;
  const salvageValue = Number(document.getElementById("fSalvageValue").value) || 0;
  let printPayload = null;

  if(id){
    const d = state.devices.find(x=>x.id===id);
    const after = {type,brand,specs,condition,importDate,note,purchaseDate,purchasePrice,vendor,invoiceNo,usefulLifeYears,warrantyMonths,salvageValue};
    // Ghi lại NHẬT KÝ THAY ĐỔI: so sánh từng trường trước/sau, chỉ log những gì thực sự thay đổi —
    // đảm bảo mọi chỉnh sửa thông tin thiết bị (kể cả sau khi đã cấp phát) đều có dấu vết trong lịch sử.
    const changes = [];
    Object.keys(after).forEach(k=>{
      const bv = d[k]===undefined||d[k]===null ? "" : d[k];
      const av = after[k]===undefined||after[k]===null ? "" : after[k];
      if(String(bv)!==String(av)){
        const label = DEVICE_FIELD_LABELS[k]||k;
        const fmtV = v => (k==="purchasePrice"||k==="salvageValue") ? fmtVND(Number(v)||0) : (v===""?"—":v);
        changes.push(`${label}: ${fmtV(bv)} → ${fmtV(av)}`);
      }
    });
    Object.assign(d, after);
    if(changes.length){
      d.history = d.history||[];
      d.history.unshift({date:new Date().toISOString(), type:"cap_nhat", label:"Cập nhật thông tin thiết bị", changes, by:currentUser?.email||"", uid:newHistoryUid()});
    }
  } else {
    const holderSel = document.getElementById("fHolder");
    const empId = holderSel ? holderSel.value : "";
    const emp = state.employees.find(e=>e.id===empId);
    const newId = nextDeviceId();
    const d = {
      id:newId, type, brand, specs, condition,
      status: emp ? "Đang sử dụng" : "Trong kho",
      holderId: emp?emp.id:null, holderName: emp?emp.name:null, dept: emp?emp.dept:"",
      importDate, note, purchaseDate, purchasePrice, vendor, invoiceNo, usefulLifeYears, warrantyMonths, salvageValue,
      repairs:[], history:[]
    };
    if(emp){
      // Cấp phát ngay lúc thêm mới cũng được coi là một nghiệp vụ BÀN GIAO đầy đủ:
      // sinh biên bản có thể in/xem lại giống hệt khi thao tác qua màn hình Nghiệp vụ.
      const nowISO = new Date().toISOString();
      printPayload = {op:"ban_giao", title:OP_META.ban_giao.title, device:deviceSnapshot(d), from:{name:"Kho IT", dept:"IT"}, to:{name:emp.name, dept:emp.dept}, by:currentUser?.email||"", note:"Nhập kho và bàn giao ngay", date:nowISO};
      d.history.push({date:nowISO, type:"ban_giao", label:"Bàn giao cho nhân viên", to:emp.name, dept:emp.dept, condition, by:currentUser?.email||"", note:"Nhập kho và bàn giao ngay", uid:newHistoryUid(), print:printPayload});
    }
    state.devices.push(d);
    state.meta.deviceSeq++;
    await persistMeta();
  }
  await persistDevices();
  closeModal();
  toast("Đã lưu thiết bị "+(id||nextDeviceId()));
  setView(state.view==="device"?"device":"devices", id);
  if(printPayload) renderPrintable(printPayload);
}

async function saveEmployee(id){
  const name = document.getElementById("eName").value.trim();
  if(!name){ toast("Vui lòng nhập họ tên", true); return; }
  const dept = document.getElementById("eDept").value;
  const position = document.getElementById("ePosition").value.trim();
  const email = document.getElementById("eEmail").value.trim();
  const phone = document.getElementById("ePhone").value.trim();
  const status = document.getElementById("eStatus").value;
  if(id){
    const e = state.employees.find(x=>x.id===id);
    Object.assign(e, {name,dept,position,email,phone,status});
    state.devices.filter(d=>d.holderId===id).forEach(d=>{ d.holderName=name; d.dept=dept; });
  } else {
    state.employees.push({id:nextEmployeeId(), name, dept, position, email, phone, status});
    state.meta.employeeSeq++;
    await persistMeta();
  }
  await persistEmployees();
  if(id) await persistDevices();
  closeModal();
  toast("Đã lưu nhân viên");
  setView("employees");
}

  return state.devices.filter(d=>d.status===meta.pickStatus);

function deviceSnapshot(d){

async function submitOp(op){
  const devId = document.getElementById("opDevice")?.value;
  if(!devId){ toast("Vui lòng chọn thiết bị", true); return; }
  const d = state.devices.find(x=>x.id===devId);
  const by = document.getElementById("opBy").value.trim();
  const note = document.getElementById("opNote").value.trim();
  const condEl = document.getElementById("opCondition");
  const condition = condEl ? condEl.value : d.condition;
  const nowISO = new Date().toISOString();

  // Áp dụng bổ sung giá trị tài sản/khấu hao nếu người dùng đã nhập ngay trong form nghiệp vụ
  const opPurchaseDateEl = document.getElementById("opPurchaseDate");
  if(opPurchaseDateEl){
    const pDate = opPurchaseDateEl.value;
    const pPrice = Number(document.getElementById("opPurchasePrice").value)||0;
    const pLife = Number(document.getElementById("opUsefulLifeYears").value)||state.settings.usefulLifeYears;
    const pWarranty = Number(document.getElementById("opWarrantyMonths").value)||state.settings.warrantyMonths;
    if(pDate || pPrice>0){ d.purchaseDate=pDate||d.purchaseDate; d.purchasePrice=pPrice||d.purchasePrice; d.usefulLifeYears=pLife; d.warrantyMonths=pWarranty; }
  }

  const entry = {date:nowISO, by, note, uid:"H"+Date.now().toString(36)+Math.random().toString(36).slice(2,7)};
  let printPayload = null;

  if(op==="ban_giao" || op==="dieu_chuyen"){
    const emp = state.employees.find(e=>e.id===document.getElementById("opEmp").value);
    if(!emp){ toast("Vui lòng chọn người nhận", true); return; }
    const fromName = d.holderName;
    const fromDept = d.dept;
    entry.type = op; entry.label = op==="ban_giao"?"Bàn giao cho nhân viên":"Điều chuyển thiết bị";
    entry.to = emp.name; entry.dept = emp.dept; entry.condition = condition;
    if(op==="dieu_chuyen"){ entry.from = fromName; }
    d.status = "Đang sử dụng"; d.holderId = emp.id; d.holderName = emp.name; d.dept = emp.dept; d.condition = condition;
    printPayload = {op, title:OP_META[op].title, device:deviceSnapshot(d), from:{name:fromName||"Kho IT", dept:fromDept||"IT"}, to:{name:emp.name, dept:emp.dept}, by, note, date:nowISO};
  } else if(op==="thu_hoi"){
    const reason = document.getElementById("opReason").value.trim();
    if(!reason){ toast("Vui lòng nhập lý do thu hồi", true); return; }
    entry.type="thu_hoi"; entry.label="Thu hồi thiết bị"; entry.from=d.holderName; entry.reason=reason; entry.condition=condition;
    printPayload = {op, title:OP_META[op].title, device:deviceSnapshot(d), from:{name:d.holderName||"—", dept:d.dept||""}, to:{name:by||"Kho IT", dept:"IT"}, reason, by, note, date:nowISO};
    d.status="Trong kho"; d.holderId=null; d.holderName=null; d.dept=""; d.condition=condition;
  } else if(op==="bao_tri_bat_dau"){
    const reason = document.getElementById("opReason").value.trim();
    if(!reason){ toast("Vui lòng nhập lý do gửi bảo trì", true); return; }
    entry.type="bao_tri_bat_dau"; entry.label="Gửi bảo trì / sửa chữa"; entry.reason=reason; entry.condition=condition;
    d.status="Bảo trì"; d.condition=condition;
    printPayload = {op, single:true, title:OP_META[op].title, device:deviceSnapshot(d), reason, by, note, date:nowISO, condition};
  } else if(op==="bao_tri_xong"){
    entry.type="bao_tri_xong"; entry.label="Hoàn tất bảo trì"; entry.condition=condition;
    d.status="Trong kho"; d.condition=condition;
    printPayload = {op, single:true, title:OP_META[op].title, device:deviceSnapshot(d), by, note, date:nowISO, condition};
  } else if(op==="thanh_ly"){
    const reason = document.getElementById("opReason").value.trim();
    if(!reason){ toast("Vui lòng nhập lý do thanh lý", true); return; }
    entry.type="thanh_ly"; entry.label="Thanh lý thiết bị"; entry.reason=reason;
    d.status="Thanh lý"; d.holderId=null; d.holderName=null; d.dept=""; d.condition=condition;
    printPayload = {op, single:true, title:OP_META[op].title, device:deviceSnapshot(d), reason, by, note, date:nowISO, condition};
  } else if(op==="sua_chua"){
    const vendor = document.getElementById("opRepairVendor").value.trim();
    const cost = Number(document.getElementById("opRepairCost").value)||0;
    const description = document.getElementById("opReason").value.trim();
    if(!description){ toast("Vui lòng nhập mô tả sửa chữa", true); return; }
    entry.type="sua_chua"; entry.label="Ghi nhận sửa chữa"; entry.reason=description; entry.vendor=vendor; entry.cost=cost;
    d.condition = condition;
    d.repairs = d.repairs||[];
    d.repairs.push({date:nowISO, vendor, description, cost, by});
    printPayload = {op, single:true, title:OP_META[op].title, device:deviceSnapshot(d), reason:description, vendor, cost, by, note, date:nowISO, condition};
  }

 if(printPayload){ entry.print = printPayload; }
  d.history = d.history||[];
  d.history.unshift(entry);
  // Ghi nhận log hệ thống độc lập an toàn trước khi lưu thiết bị
  await saveGlobalLog(op, d.id, entry, printPayload);
  await persistDevices();
  closeModal();
  toast(op==="sua_chua" ? "Đã ghi nhận sửa chữa cho "+d.id : "Đã lưu nghiệp vụ cho "+d.id);
  if(printPayload) renderPrintable(printPayload);
  setView(state.view==="device"?"device":(state.view==="ops"?"ops":"devices"), state.view==="device"?d.id:undefined);
}

/* ---------- Mở lại trang in đã lưu (từ lịch sử vòng đời thiết bị) ---------- */
function reprintSaved(deviceId, uid){
  const d = state.devices.find(x=>x.id===deviceId);
  const entry = d && (d.history||[]).find(h=>h.uid===uid);
  if(!entry || !entry.print){ toast("Không tìm thấy biên bản đã lưu cho sự kiện này", true); return; }
  renderPrintable(entry.print);
}

/* ---------- Điều khiển khổ giấy in động (@page) — dùng cho tem máy in nhiệt ---------- */
function setPrintPage(sizeCss, marginCss){
  let s = document.getElementById("dynPageStyle");
  if(!s){ s = document.createElement("style"); s.id = "dynPageStyle"; document.head.appendChild(s); }
  s.textContent = `@media print{ @page{ size:${sizeCss}; margin:${marginCss}; } }`;
}
function resetPrintPage(){
  const s = document.getElementById("dynPageStyle");
  if(s) s.textContent = "";
}
window.addEventListener("afterprint", ()=>{ resetPrintPage(); });

/* ---------- Nội dung QR: mã hoá đầy đủ thông tin thiết bị để quét bằng camera điện thoại
   là xem được ngay (người đang dùng, thông số, giá trị, ngày mua) — không chỉ mã TB.
   Mã vạch (CODE128) vẫn chỉ chứa mã thiết bị: đây là chuẩn của mã vạch 1D, dùng để máy quét
   kho tra cứu nhanh trong ứng dụng; toàn bộ chi tiết được đưa vào QR bên cạnh. ---------- */
function buildDeviceQRText(d){
  const lines = [
    `MÃ TÀI SẢN: ${d.id}`,
    `Thiết bị: ${d.type} - ${d.brand}`,
    d.specs ? `Thông số: ${d.specs}` : null,
    `Người đang sử dụng: ${d.holderName||"Trong kho"}`,
    d.dept ? `Bộ phận: ${d.dept}` : null,
    `Tình trạng: ${d.condition||"—"}`,
    d.purchaseDate ? `Ngày mua: ${fmtDate(d.purchaseDate)}` : null,
    d.purchasePrice ? `Giá trị mua: ${fmtVND(d.purchasePrice)}` : null
  ].filter(Boolean);
  return lines.join("\n");
}

/* ---------- Tem tài sản: mã vạch + QR — phục vụ kiểm kê ---------- */
function renderAssetLabels(ids, mode){
  mode = mode || "a4";
  const devices = ids.map(id=>state.devices.find(d=>d.id===id)).filter(Boolean);
  if(devices.length===0){ toast("Không tìm thấy thiết bị để in tem", true); return; }
  const area = document.getElementById("print-area");

  /* ---- Khổ tem máy in nhiệt (Xprinter, Zebra…): mỗi thiết bị 1 tem, khổ giấy đúng bằng kích thước tem.
     QR, mã vạch và cỡ chữ được TÍNH TOÁN TỈ LỆ theo đúng wmm x hmm người dùng chọn/nhập,
     thay vì dùng con số cố định — nhờ vậy tem 40x30, 50x30 hay kích thước tuỳ chỉnh đều
     hiển thị đúng tỉ lệ, không bị vỡ layout hay tràn tem. ---- */
  if(mode.startsWith("th")){
    const m = mode.match(/th(\d+)x(\d+)/);
    const wmm = m ? Number(m[1]) : 50;
    const hmm = m ? Number(m[2]) : 30;
    const areaMm2 = wmm*hmm;
    const compact = areaMm2 < 950 || wmm < 34; // tem quá nhỏ (vd 30x20) chỉ đủ chỗ cho mã vạch
    // scale tương đối so với tem chuẩn 50x30mm (giá trị gốc đã hoạt động tốt trên máy in thực tế)
    const scale = Math.max(0.55, Math.min(1.8, Math.sqrt(areaMm2/(50*30))));
    const PX_PER_MM = 3.78;
    const qrMm = Math.max(8, Math.min(hmm*0.62, wmm*0.42));
    const qrPx = Math.round(qrMm*PX_PER_MM);
    const bcHeightPx = Math.round(Math.max(10, Math.min(28, 22*scale)));
    const bcFontPx = Math.round(Math.max(6, Math.min(11, 9*scale)));
    const idFontPx = Math.round(Math.max(10, Math.min(20, 13*scale)));
    const coFontPx = Math.round(Math.max(6, Math.min(9, 7*scale)));
    const nameFontPx = Math.round(Math.max(6, Math.min(10, 7*scale)));
    setPrintPage(`${wmm}mm ${hmm}mm`, "1.5mm");
    area.innerHTML = devices.map((d,i)=>`
      <div class="thermal-page ${i===devices.length-1?'last':''}" style="width:${wmm-3}mm;height:${hmm-3}mm;">
        <div class="th-co" style="font-size:${coFontPx}px;">JEANIC · IT</div>
        <div class="th-id" style="font-size:${idFontPx}px;">${esc(d.id)}</div>
        <div class="th-name" style="font-size:${nameFontPx}px;">${esc(d.type)} - ${esc(d.brand)}</div>
        <svg class="th-barcode" id="th-bc-${esc(d.id)}"></svg>
        ${compact?"":`<div class="th-qr" id="th-qr-${esc(d.id)}"></div>`}
      </div>`).join("");
    setTimeout(()=>{
      devices.forEach(d=>{
        try{ JsBarcode("#th-bc-"+d.id, d.id, {format:"CODE128", displayValue:true, fontSize:bcFontPx, height:bcHeightPx, margin:0}); }catch(e){}

   (tự dò dòng tiêu đề, bỏ qua các dòng tiêu đề công ty / dòng mẫu trống phía trên)

const DEVICE_FIELD_MAP = {
  id:"Mã TB", type:"Loại thiết bị", brand:"Thương hiệu", specs:"Thông số kỹ thuật", condition:"Tình trạng",
  status:"Trạng thái sử dụng", holderName:"Người đang sử dụng", dept:"Bộ phận", importDate:"Ngày nhập kho", note:"Ghi chú",
  purchaseDate:"Ngày mua", purchasePrice:"Giá mua", vendor:"Nhà cung cấp", invoiceNo:"Số hoá đơn",
  warrantyMonths:"Bảo hành (tháng)", usefulLifeYears:"Thời gian khấu hao (năm)", salvageValue:"Giá trị thanh lý"
};
const EMPLOYEE_FIELD_MAP = { id:"Mã NV", name:"Họ và tên", dept:"Bộ phận", position:"Chức vụ", email:"Email", phone:"Số điện thoại", status:"Trạng thái" };

let importState = { workbook:null, sheetNames:[], deviceSheet:"", employeeSheet:"", devicePreview:null, employeePreview:null };

function aoaFindRows(aoa, headerMatchValue, fieldMap){
  let headerRowIdx = -1;
  for(let i=0;i<aoa.length;i++){
    if((aoa[i]||[]).some(c=>String(c===undefined?"":c).trim()===headerMatchValue)){ headerRowIdx=i; break; }
  }
  if(headerRowIdx===-1) return {rows:[], headerFound:false};
  const headerRow = (aoa[headerRowIdx]||[]).map(c=>String(c===undefined?"":c).trim());
  const colIdx = {};
  Object.entries(fieldMap).forEach(([outKey, label])=>{ colIdx[outKey] = headerRow.findIndex(h=>h===label); });
  const rows = [];
  for(let r=headerRowIdx+1;r<aoa.length;r++){
    const raw = aoa[r]; if(!raw) continue;
    const obj = {}; let any=false;
    Object.entries(colIdx).forEach(([outKey, idx])=>{
      const v = idx>=0 && raw[idx]!==undefined ? String(raw[idx]).trim() : "";
      obj[outKey]=v; if(v) any=true;
    });
    if(!any) continue;
    rows.push(obj);
  }
  return {rows, headerFound:true};
}
function classifyDeviceRow(row){
  const onlyId = row.id && !row.type && !row.brand && !row.specs && !row.condition && !row.status && !row.holderName && !row.dept && !row.importDate && !row.note && !row.purchaseDate && !row.purchasePrice;
  if(!row.id) return "error";
  if(onlyId) return "placeholder";
  if(!row.type) return "error";
  return state.devices.some(d=>d.id===row.id) ? "update" : "new";
}
function classifyEmployeeRow(row){
  const onlyId = row.id && !row.name && !row.dept && !row.position && !row.email && !row.phone && !row.status;
  if(!row.id) return "error";
  if(onlyId) return "placeholder";
  if(!row.name) return "error";
  return state.employees.some(e=>e.id===row.id) ? "update" : "new";
}

function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:"array", cellDates:true});
      importState.workbook = wb;
      importState.sheetNames = wb.SheetNames;
      const guessDev = wb.SheetNames.find(n=>/thiết bị|thiet bi|device/i.test(n)) || "";
      const guessEmp = wb.SheetNames.find(n=>/nhân viên|nhan vien|employee/i.test(n)) || "";
      importState.deviceSheet = guessDev; importState.employeeSheet = guessEmp;
      document.getElementById("importSheetPick").innerHTML = `
        <div class="field-row" style="margin-top:14px;">
          <div class="field"><label>Sheet chứa Danh sách Thiết bị</label>
            <select id="pickDevSheet" onchange="app.setImportSheet('device', this.value)">
              <option value="">— không nhập —</option>
              ${wb.SheetNames.map(n=>`<option value="${esc(n)}" ${guessDev===n?'selected':''}>${esc(n)}</option>`).join("")}
            </select></div>
          <div class="field"><label>Sheet chứa Danh sách Nhân viên</label>
            <select id="pickEmpSheet" onchange="app.setImportSheet('employee', this.value)">
              <option value="">— không nhập —</option>
              ${wb.SheetNames.map(n=>`<option value="${esc(n)}" ${guessEmp===n?'selected':''}>${esc(n)}</option>`).join("")}
            </select></div>
        </div>
        <button class="btn btn-brand" onclick="app.buildImportPreview()">Xem trước dữ liệu</button>
      `;
      document.getElementById("importPreviewArea").innerHTML = "";
    }catch(err){
      console.error(err);
      toast("Không đọc được file. Kiểm tra định dạng file.", true);
    }
  };
  reader.readAsArrayBuffer(file);
}
function setImportSheet(kind, val){ if(kind==="device") importState.deviceSheet=val; else importState.employeeSheet=val; }

function buildImportPreview(){
  const wb = importState.workbook;
  if(!wb){ toast("Vui lòng chọn file trước", true); return; }
  let devResult = null, empResult = null;
  if(importState.deviceSheet){
    const ws = wb.Sheets[importState.deviceSheet];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:"yyyy-mm-dd", defval:""});
    devResult = aoaFindRows(aoa, "Mã TB", DEVICE_FIELD_MAP);
  }
  if(importState.employeeSheet){
    const ws = wb.Sheets[importState.employeeSheet];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:"yyyy-mm-dd", defval:""});
    empResult = aoaFindRows(aoa, "Mã NV", EMPLOYEE_FIELD_MAP);
  }
  importState.devicePreview = devResult;
  importState.employeePreview = empResult;
  renderImportPreview();
}
function summarize(rows, classifyFn){
  const s = {new:0, update:0, error:0, placeholder:0};
  rows.forEach(r=>s[classifyFn(r)]++);
  return s;
}
function renderImportPreview(){
  const dr = importState.devicePreview, er = importState.employeePreview;
  let html = "";
  if(importState.deviceSheet){
    if(!dr || !dr.headerFound){
      html += `<div class="panel"><h3>Danh sách Thiết bị</h3>${emptyState("Không tìm thấy dòng tiêu đề 'Mã TB'","Kiểm tra lại sheet đã chọn có đúng cấu trúc cột 'Mã TB' hay không.")}</div>`;
    } else {
      const s = summarize(dr.rows, classifyDeviceRow);
      html += `<div class="panel">
        <div class="panel-head"><h3>Danh sách Thiết bị</h3>
          <span class="pill pill-brand">${s.new} thêm mới</span> <span class="pill pill-amber">${s.update} cập nhật</span> <span class="pill pill-rust">${s.error} lỗi</span> <span class="pill pill-slate">${s.placeholder} dòng trống bỏ qua</span>
        </div>
        <table class="data"><tr><th>Mã TB</th><th>Loại / Thương hiệu</th><th>Người dùng</th><th>Giá mua</th><th>Trạng thái nhập</th></tr>
        ${dr.rows.filter(r=>classifyDeviceRow(r)!=="placeholder").map(r=>{
          const c = classifyDeviceRow(r);
          const rowClass = c==="error"?"row-error":c==="update"?"row-update":"";
          const label = c==="error"?"⚠ Thiếu Loại thiết bị":c==="update"?"Sẽ cập nhật":"Sẽ thêm mới";
          return `<tr class="${rowClass}"><td><b>${esc(r.id)}</b></td><td>${esc(r.type||"—")} · ${esc(r.brand||"")}</td><td>${esc(r.holderName||"—")}</td><td>${r.purchasePrice?fmtVND(r.purchasePrice):"—"}</td><td>${label}</td></tr>`;
        }).join("")}
        </table>
      </div>`;
    }
  }
  if(importState.employeeSheet){
    if(!er || !er.headerFound){
      html += `<div class="panel"><h3>Danh sách Nhân viên</h3>${emptyState("Không tìm thấy dòng tiêu đề 'Mã NV'","Kiểm tra lại sheet đã chọn có đúng cấu trúc cột 'Mã NV' hay không.")}</div>`;
    } else {
      const s = summarize(er.rows, classifyEmployeeRow);
      html += `<div class="panel">
        <div class="panel-head"><h3>Danh sách Nhân viên</h3>
          <span class="pill pill-brand">${s.new} thêm mới</span> <span class="pill pill-amber">${s.update} cập nhật</span> <span class="pill pill-rust">${s.error} lỗi</span> <span class="pill pill-slate">${s.placeholder} dòng trống bỏ qua</span>
        </div>
        <table class="data"><tr><th>Mã NV</th><th>Họ và tên</th><th>Bộ phận</th><th>Email</th><th>Trạng thái nhập</th></tr>
        ${er.rows.filter(r=>classifyEmployeeRow(r)!=="placeholder").map(r=>{
          const c = classifyEmployeeRow(r);
          const rowClass = c==="error"?"row-error":c==="update"?"row-update":"";
          const label = c==="error"?"⚠ Thiếu Họ và tên":c==="update"?"Sẽ cập nhật":"Sẽ thêm mới";
          return `<tr class="${rowClass}"><td><b>${esc(r.id)}</b></td><td>${esc(r.name||"—")}</td><td>${esc(r.dept||"")}</td><td>${esc(r.email||"")}</td><td>${label}</td></tr>`;
        }).join("")}
        </table>
      </div>`;
    }
  }
  if(!importState.deviceSheet && !importState.employeeSheet){
    html = emptyState("Chưa chọn sheet nào","Chọn ít nhất 1 sheet (Thiết bị hoặc Nhân viên) để xem trước.");
  } else {
    html += `<button class="btn btn-brand" onclick="app.commitImport()">✓ Xác nhận nhập dữ liệu</button>`;
  }
  document.getElementById("importPreviewArea").innerHTML = html;
}
function parseNum(v){ const n = Number(String(v).replace(/[^\d.-]/g,"")); return isNaN(n)?0:n; }
async function commitImport(){
  let addedDev=0, updDev=0, addedEmp=0, updEmp=0;
  if(importState.devicePreview && importState.devicePreview.headerFound){
    importState.devicePreview.rows.forEach(row=>{
      const c = classifyDeviceRow(row);
      if(c==="error" || c==="placeholder") return;
      if(c==="new"){
        const emp = row.holderName ? state.employees.find(e=>e.name.trim().toLowerCase()===row.holderName.trim().toLowerCase()) : null;
        state.devices.push({
          id:row.id, type:row.type, brand:row.brand||"", specs:row.specs||"", condition:row.condition||"Tốt",
          status: row.status || (emp?"Đang sử dụng":"Trong kho"),
          holderId: emp?emp.id:null, holderName: row.holderName||(emp?emp.name:null), dept: row.dept||(emp?emp.dept:""),
          importDate: row.importDate||todayISO(), note: row.note||"",
          purchaseDate: row.purchaseDate||"", purchasePrice: parseNum(row.purchasePrice), vendor: row.vendor||"", invoiceNo: row.invoiceNo||"",
          warrantyMonths: row.warrantyMonths?parseNum(row.warrantyMonths):state.settings.warrantyMonths,
          usefulLifeYears: row.usefulLifeYears?parseNum(row.usefulLifeYears):state.settings.usefulLifeYears,
          salvageValue: parseNum(row.salvageValue),
          repairs:[], history:[{date:new Date().toISOString(), type:"ban_giao", label:"Nhập từ Excel", to:row.holderName||"", dept:row.dept||"", condition:row.condition||"Tốt", by:currentUser?.email||"", note:"Nhập hàng loạt từ file Excel/CSV"}]
        });
        addedDev++;
        const num = parseInt(String(row.id).replace(/\D/g,""));
        if(!isNaN(num) && num>=state.meta.deviceSeq) state.meta.deviceSeq = num+1;
      } else if(c==="update"){
        const d = state.devices.find(x=>x.id===row.id);
        if(row.type) d.type=row.type; if(row.brand) d.brand=row.brand; if(row.specs) d.specs=row.specs;
        if(row.condition) d.condition=row.condition; if(row.status) d.status=row.status;
        if(row.holderName) d.holderName=row.holderName; if(row.dept) d.dept=row.dept;
        if(row.importDate) d.importDate=row.importDate; if(row.note) d.note=row.note;
        if(row.purchaseDate) d.purchaseDate=row.purchaseDate;
        if(row.purchasePrice) d.purchasePrice=parseNum(row.purchasePrice);
        if(row.vendor) d.vendor=row.vendor; if(row.invoiceNo) d.invoiceNo=row.invoiceNo;
        if(row.warrantyMonths) d.warrantyMonths=parseNum(row.warrantyMonths);
        if(row.usefulLifeYears) d.usefulLifeYears=parseNum(row.usefulLifeYears);
        if(row.salvageValue) d.salvageValue=parseNum(row.salvageValue);
        updDev++;
      }
    });
  }
  if(importState.employeePreview && importState.employeePreview.headerFound){
    importState.employeePreview.rows.forEach(row=>{
      const c = classifyEmployeeRow(row);
      if(c==="error" || c==="placeholder") return;
      if(c==="new"){
        state.employees.push({id:row.id, name:row.name, dept:row.dept||"", position:row.position||"", email:row.email||"", phone:row.phone||"", status:row.status||"Đang làm việc"});
        addedEmp++;
        const num = parseInt(String(row.id).replace(/\D/g,""));
        if(!isNaN(num) && num>=state.meta.employeeSeq) state.meta.employeeSeq = num+1;
      } else if(c==="update"){
        const e = state.employees.find(x=>x.id===row.id);
        if(row.name) e.name=row.name; if(row.dept) e.dept=row.dept; if(row.position) e.position=row.position;
        if(row.email) e.email=row.email; if(row.phone) e.phone=row.phone; if(row.status) e.status=row.status;
        updEmp++;
      }
    });
  }
  await persistAll();
  toast(`Đã nhập: ${addedDev} thiết bị mới, ${updDev} cập nhật · ${addedEmp} nhân viên mới, ${updEmp} cập nhật`);
  setView("devices");
}

/* =========================================================
   TÀI KHOẢN NHÂN VIÊN — cấp tài khoản đăng nhập để họ tự thao tác thay vì admin nhập tay

async function renderAccounts(){

    <div class="panel">
      <h3>Cấp tài khoản đăng nhập mới</h3>
      ${Store.mode!=="cloud" ? `<div class="hint">Đang chạy ở chế độ cục bộ (không có máy chủ) — không thể tạo tài khoản đăng nhập thật. Tính năng này chỉ hoạt động khi kết nối được Firebase.</div>` : `
      <div class="field"><label>Liên kết với nhân viên (không bắt buộc)</label>
        <select id="accEmpLink"><option value="">— không liên kết —</option>${state.employees.map(e=>`<option value="${e.id}">${esc(e.name)} (${esc(e.dept)})</option>`).join("")}</select>
      </div>
      <div class="field-row">
        <div class="field"><label class="req">Email đăng nhập</label><input type="email" id="accEmail" placeholder="ten@jeanicgarment.com"></div>
        <div class="field"><label class="req">Mật khẩu (≥ 6 ký tự)</label><input type="password" id="accPass" placeholder="••••••••"></div>
      </div>
      <div class="field"><label>Vai trò</label><select id="accRole"><option value="user">Người dùng (chỉ xem &amp; thao tác nghiệp vụ)</option><option value="admin">Quản trị (toàn quyền, gồm cài đặt &amp; tài khoản)</option></select></div>
      <button class="btn btn-brand" onclick="app.createAccount()">Tạo tài khoản</button>
      <div class="hint">Tài khoản mới có thể đăng nhập ngay bằng email/mật khẩu vừa tạo. Việc tạo tài khoản này không ảnh hưởng tới phiên đăng nhập hiện tại của bạn.</div>`}
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Danh sách tài khoản</h3><button class="btn btn-sm" onclick="app.renderAccounts()">↻ Tải lại</button></div>
      <div id="accountsList">${Store.mode==="cloud" ? emptyState("Đang tải…","") : emptyState("Không khả dụng ở chế độ cục bộ","Kết nối Firebase để quản lý tài khoản nhân viên.")}</div>
    </div>
  `;
  if(Store.mode==="cloud") await loadAccountsList();
}
async function loadAccountsList(){
  try{
    const snap = await db.collection("jeanic_accounts").orderBy("createdAt","desc").get();
    const list = []; snap.forEach(doc=>list.push({uid:doc.id, ...doc.data()}));
    state.accounts = list;
    document.getElementById("accountsList").innerHTML = list.length===0 ? emptyState("Chưa có tài khoản nào","Tạo tài khoản đầu tiên ở trên.") : `
      <table class="data">
        <tr><th style="padding-left:22px;">Email</th><th>Vai trò</th><th>Liên kết NV</th><th>Trạng thái</th><th>Ngày tạo</th><th></th></tr>
        ${list.map(a=>{
          const emp = state.employees.find(e=>e.id===a.employeeId);
          return `<tr>
            <td style="padding-left:22px;">${esc(a.email)}</td>
            <td><span class="pill ${a.role==='admin'?'pill-brand':'pill-slate'}">${a.role==='admin'?'Quản trị':'Người dùng'}</span></td>
            <td>${emp?esc(emp.name):"—"}</td>
            <td><span class="pill ${a.active===false?'pill-rust':'pill-brand'}">${a.active===false?'Đã vô hiệu hoá':'Đang hoạt động'}</span></td>
            <td class="cell-sub">${fmtDate(a.createdAt)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-sm" onclick="app.toggleAccountRole('${a.uid}','${a.role}')">Đổi vai trò</button>
              <button class="btn btn-sm ${a.active===false?'':'btn-danger'}" onclick="app.toggleAccountActive('${a.uid}', ${a.active===false})">${a.active===false?'Kích hoạt lại':'Vô hiệu hoá'}</button>
              <button class="btn btn-sm" onclick="app.sendReset('${a.email}')">Đặt lại MK</button>
            </td>
          </tr>`;
        }).join("")}
      </table>
      <div class="hint" style="margin-top:10px;">Lưu ý: "Vô hiệu hoá" chặn quyền truy cập trong ứng dụng này (kiểm tra khi đăng nhập); do giới hạn của Firebase phía trình duyệt, tài khoản vẫn tồn tại trong hệ thống xác thực — nếu cần khoá triệt để, hãy xoá thủ công trong Firebase Console → Authentication.</div>`;
  }catch(e){
    console.error(e);
    document.getElementById("accountsList").innerHTML = emptyState("Không tải được danh sách tài khoản", e.message||"");
  }
}
async function createAccount(){
  const email = document.getElementById("accEmail").value.trim();
  const pass = document.getElementById("accPass").value;
  const role = document.getElementById("accRole").value;
  const employeeId = document.getElementById("accEmpLink").value || null;
  if(!email || pass.length<6){ toast("Vui lòng nhập email hợp lệ và mật khẩu ≥ 6 ký tự", true); return; }
  try{
    const cred = await fbSecondaryApp.auth().createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;
    await fbSecondaryApp.auth().signOut();
    await db.collection("jeanic_accounts").doc(uid).set({
      email, role, employeeId, active:true, createdAt:new Date().toISOString(), createdBy: currentUser?.email||""
    });
    toast("Đã tạo tài khoản cho "+email);
    renderAccounts();
  }catch(e){
    toast("Lỗi tạo tài khoản: "+(e.message||e), true);
  }
}
async function toggleAccountRole(uid, currentRoleVal){
  const newRole = currentRoleVal==="admin" ? "user" : "admin";
  try{ await db.collection("jeanic_accounts").doc(uid).update({role:newRole}); toast("Đã đổi vai trò"); loadAccountsList(); }
  catch(e){ toast("Lỗi: "+(e.message||e), true); }
}
async function toggleAccountActive(uid, makeActive){
  try{ await db.collection("jeanic_accounts").doc(uid).update({active:makeActive}); toast(makeActive?"Đã kích hoạt lại":"Đã vô hiệu hoá tài khoản"); loadAccountsList(); }
  catch(e){ toast("Lỗi: "+(e.message||e), true); }
}
async function sendReset(email){
  try{ await auth.sendPasswordResetEmail(email); toast("Đã gửi email đặt lại mật khẩu tới "+email); }
  catch(e){ toast("Lỗi: "+(e.message||e), true); }
}

  const s = state.settings;
  document.getElementById("content").innerHTML = `
    <div class="panel">
      <h3>Cấu hình mặc định khấu hao &amp; cảnh báo</h3>
      <div class="field-row">
        <div class="field"><label>Thời gian khấu hao mặc định (năm)</label><input type="number" min="0.5" step="0.5" id="sUsefulLife" value="${s.usefulLifeYears}"></div>
        <div class="field"><label>Bảo hành mặc định (tháng)</label><input type="number" min="0" id="sWarranty" value="${s.warrantyMonths}"></div>
      </div>
      <div class="field-row">

        <div class="field"><label>Cảnh báo khi còn ≤ (ngày) hết bảo hành</label><input type="number" min="0" id="sWarWarn" value="${s.warrantyWarnDays}"></div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" onclick="app.exportBackup()">⬇ Xuất file sao lưu (JSON)</button>
        <label class="btn" style="cursor:pointer;">⬆ Phục hồi từ file backup<input type="file" accept="application/json" style="display:none;" onchange="app.importBackup(this.files[0])"></label>

      ${Store.mode==="local" ? `<div class="hint">Không kết nối được Firebase — kiểm tra mạng hoặc cấu hình dự án. Dữ liệu hiện chỉ lưu trên trình duyệt này.</div>` : ""}

}
async function saveSettings(){
  state.settings.usefulLifeYears = Number(document.getElementById("sUsefulLife").value) || DEFAULT_SETTINGS.usefulLifeYears;
  state.settings.warrantyMonths = Number(document.getElementById("sWarranty").value) || 0;
  state.settings.depreciationWarnPercent = Number(document.getElementById("sDepWarn").value) || 0;
  state.settings.warrantyWarnDays = Number(document.getElementById("sWarWarn").value) || 0;
  state.settings.repairCostWarnPercent = Number(document.getElementById("sRepairWarn").value) || 0;
  await persistSettings();
  toast("Đã lưu cấu hình");
}
function exportBackup(){
  const payload = {exportedAt:new Date().toISOString(), devices:state.devices, employees:state.employees, meta:state.meta, settings:state.settings};
  downloadFile(JSON.stringify(payload,null,2), `jeanic-backup-${todayISO()}.json`, "application/json");
  toast("Đã xuất file sao lưu");
}
function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data.devices) || !Array.isArray(data.employees)){ toast("File backup không hợp lệ", true); return; }
      if(!confirm("Phục hồi sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại. Bạn chắc chắn muốn tiếp tục?")) return;
      state.devices = data.devices; state.employees = data.employees;
      state.meta = data.meta || state.meta; state.settings = {...DEFAULT_SETTINGS, ...(data.settings||{})};
      await persistAll();
      toast("Đã phục hồi dữ liệu thành công");
      setView("dashboard");
    }catch(err){ console.error(err); toast("Không đọc được file backup", true); }
  };
  reader.readAsText(file);
}
