<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEANIC IT · Quản lý vòng đời thiết bị</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
/* CSS rút gọn tối đa để đủ không gian hiển thị Code */
:root{--ink:#14181F;--ink-soft:#4B5563;--paper:#F4F6F8;--surface:#FFFFFF;--line:#DDE2DE;--line-soft:#EAEDEA;--brand:#1B5A96;--brand-dark:#113F6B;--brand-tint:#E6F0FA;--amber:#B4740D;--amber-tint:#FBF0DD;--rust:#AF3B24;--rust-tint:#FBE7E1;--slate:#5B6470;--slate-tint:#E7EAEC;--radius:10px;--font-display:'Space Grotesk', sans-serif;--font-body:'Inter', sans-serif;--font-mono:'IBM Plex Mono', monospace;}
*{box-sizing:border-box;} html,body{margin:0;padding:0;} body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
#shell{display:flex;min-height:100vh;} #sidebar{width:248px;flex:none;background:var(--ink);color:#EDEFEC;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
#sidebar .brand{padding:30px 20px 20px;border-bottom:1px solid rgba(255,255,255,.09);text-align:center;} #sidebar .brand img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #334155;margin-bottom:12px;}
#sidebar .brand h1{font-family:var(--font-display);font-size:16px;margin:0;font-weight:600;} nav.main-nav{padding:14px 10px;flex:1;overflow-y:auto;}
nav.main-nav .grp-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7B848C;padding:14px 12px 6px;}
nav.main-nav button{width:100%;text-align:left;background:none;border:none;color:#CBD1D6;font-family:var(--font-body);font-size:13.5px;font-weight:500;padding:9px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:2px;}
nav.main-nav button:hover{background:rgba(255,255,255,.06);color:#fff;} nav.main-nav button.active{background:var(--brand);color:#fff;}
#main{flex:1;min-width:0;display:flex;flex-direction:column;} #topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;}
#topbar h2{font-family:var(--font-display);font-size:19px;margin:0;} #content{padding:26px 28px 60px;max-width:1180px;width:100%;margin:0 auto;}
.btn{font-family:var(--font-body);font-size:13px;font-weight:600;border-radius:8px;padding:9px 15px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-brand{background:var(--brand);border-color:var(--brand);color:#fff;} .btn-brand:hover{background:var(--brand-dark);}
.grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;} .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
.stat-card .n{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--brand);}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;} .panel h3{font-family:var(--font-display);font-size:15px;margin:0 0 14px;}
table.data{width:100%;border-collapse:collapse;font-size:13px;} table.data th{text-align:left;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);padding:0 12px 10px;border-bottom:1px solid var(--line);}
table.data td{padding:12px;border-bottom:1px solid var(--line-soft);} table.data tr:hover{background:var(--brand-tint);cursor:pointer;}
.pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;} .pill-brand{background:var(--brand-tint);color:var(--brand-dark);} .pill-slate{background:var(--slate-tint);color:var(--slate);} .pill-rust{background:var(--rust-tint);color:var(--rust);}
.field{margin-bottom:13px;} .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input, .field select, .field textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:7px;font-family:var(--font-body);} .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;background:rgba(20,24,31,.5);padding:40px 16px;} #modal-root.open{display:flex;}
.modal-box{background:var(--surface);border-radius:12px;width:100%;max-width:560px;} .modal-head{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;} .modal-body{padding:20px;max-height:60vh;overflow-y:auto;} .modal-foot{padding:16px;border-top:1px solid var(--line);text-align:right;}
#login-overlay{position:fixed;inset:0;background:var(--ink);z-index:100;display:flex;align-items:center;justify-content:center;} .login-box{background:var(--surface);padding:40px;border-radius:12px;width:350px;text-align:center;}
.admin-only{display:none !important;} #toast-wrap{position:fixed;bottom:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:8px;} .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;} .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:left;cursor:pointer;} .tile:hover{border-color:var(--brand);}
@media print{#shell > *, #login-overlay, #toast-wrap, #modal-root{display:none !important;} #print-area{display:block !important;} body{background:#fff;}}
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <h3 style="font-family:var(--font-display);margin-bottom:20px;">JEANIC IT - Đăng nhập</h3>
    <div class="field"><input type="email" id="loginEmail" placeholder="Email nội bộ"></div>
    <div class="field"><input type="password" id="loginPass" placeholder="Mật khẩu"></div>
    <button class="btn btn-brand" style="width:100%;justify-content:center;" onclick="app.login()">Đăng nhập</button>
  </div>
</div>

<div id="shell" style="display: none;">
  <aside id="sidebar">
    <div class="brand"><img src="logo.jpg" alt="JEANIC"><h1>Quản lý Thiết bị</h1></div>
    <nav class="main-nav" id="mainNav"></nav>
  </aside>
  <div id="main">
    <div id="topbar">
      <div><h2 id="pageTitle">Tổng quan</h2></div>
      <div style="display:flex;gap:15px;align-items:center;">
        <div id="topbarActions" style="display:flex;gap:10px;"></div>
        <span id="currentUserRole" class="pill pill-brand"></span>
        <button class="btn btn-brand" onclick="app.logout()" style="padding:4px 8px;">Thoát</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modal-root"><div class="modal-box" id="modalBox"></div></div>
<div id="toast-wrap"></div><div id="print-area"></div>

<script>
/* --- FIREBASE CỦA ANH --- */
const firebaseConfig = {
  apiKey: "AIzaSyDd50N1NSJrF1dbvmuiQ1Fd6NaI-ArohAc",
  authDomain: "jeanic-it-assets.firebaseapp.com",
  projectId: "jeanic-it-assets",
  storageBucket: "jeanic-it-assets.firebasestorage.app",
  messagingSenderId: "385116689675",
  appId: "1:385116689675:web:c940b184df9da94ea47e0e",
  measurementId: "G-XFZFWWWC7X"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore();
const secondaryApp = firebase.initializeApp(firebaseConfig, "SecondaryApp");
const ADMIN_EMAILS = ["hoa.bui@jeanicgarment.com"];
let currentRole = "user"; let currentUser = null;

/* --- DATA LAYER --- */
const DEPARTMENTS = ["Ban Giám đốc","IT","Nhân sự (HR)","Kế toán","Kinh doanh","Plan (Kế hoạch)","Cắt (Cutting)","May (Sewing)","Hoàn thiện (Finishing)","QA/QC","Kho (Warehouse)","Bảo trì (Maintenance)","Xuất nhập khẩu","Khác"];
const CONDITIONS = ["Mới","Tốt","Khá","Trung bình","Hỏng nhẹ","Hỏng nặng"];
const DEVICE_TYPES = ["Laptop","Laptop + Sạc","Màn hình","Bàn phím","Chuột không dây","Chuột có dây","Tai nghe","Máy in","Khác"];
const STATUS_META = { "Đang sử dụng":{pill:"pill-brand"}, "Trong kho":{pill:"pill-slate"}, "Bảo trì":{pill:"pill-amber"}, "Thanh lý":{pill:"pill-rust"} };
const DEFAULT_SETTINGS = { usefulLifeYears: 3, warrantyMonths: 12 };
const state = { devices: [], employees: [], meta: { deviceSeq: 1, employeeSeq: 1 }, settings: { ...DEFAULT_SETTINGS }, view: "dashboard" };

const Store = {
  async get(key){ try{ const doc = await db.collection('jeanic_data').doc(key).get(); return doc.exists?{value:doc.data().dataString}:null; }catch(e){return null;} },
  async set(key, val){ try{ await db.collection('jeanic_data').doc(key).set({dataString:val}); return true; }catch(e){return false;} }
};
async function loadAll(){
  const [d,e,m,s] = await Promise.all([ Store.get("devices"), Store.get("employees"), Store.get("meta"), Store.get("settings") ]);
  if(d&&e&&m){ state.devices=JSON.parse(d.value); state.employees=JSON.parse(e.value); state.meta=JSON.parse(m.value); state.settings=s?{...DEFAULT_SETTINGS,...JSON.parse(s.value)}:DEFAULT_SETTINGS; }
  else await persistAll();
}
async function persistDevices(){ await Store.set("devices", JSON.stringify(state.devices)); }
async function persistEmployees(){ await Store.set("employees", JSON.stringify(state.employees)); }
async function persistMeta(){ await Store.set("meta", JSON.stringify(state.meta)); }
async function persistSettings(){ await Store.set("settings", JSON.stringify(state.settings)); }
async function persistAll(){ await Promise.all([persistDevices(),persistEmployees(),persistMeta(),persistSettings()]); }

function pad3(n){ return String(n).padStart(3,"0"); } function nextDeviceId(){ return "TB" + pad3(state.meta.deviceSeq); } function nextEmployeeId(){ return "NV" + pad3(state.meta.employeeSeq); }
function fmtVND(n){ return n?Math.round(Number(n)).toLocaleString("vi-VN")+" ₫":"—"; } function esc(s){ return s?String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])):""; }

/* --- AUTH --- */
auth.onAuthStateChanged(async (user) => {
  if(user){
    currentUser = user; currentRole = ADMIN_EMAILS.includes(user.email) ? "admin" : "user";
    document.getElementById('login-overlay').style.display='none'; document.getElementById('shell').style.display='flex';
    document.getElementById('currentUserRole').innerText = currentRole.toUpperCase();
    const rs = document.getElementById("roleStyle");
    if(currentRole === 'user'){ if(!rs){ const style = document.createElement('style'); style.id="roleStyle"; style.innerHTML='.admin-only{display:none !important;}'; document.head.appendChild(style); } }
    else if(rs) rs.remove();
    await loadAll(); setView("dashboard");
  } else { document.getElementById('login-overlay').style.display='flex'; document.getElementById('shell').style.display='none'; }
});
async function login() { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } catch(e){ alert("Sai thông tin đăng nhập"); } }
function logout() { auth.signOut(); }

/* --- VIEWS --- */
const NAV = [
  {grp:"Tổng quan", items:[{id:"dashboard", label:"Dashboard"}]},
  {grp:"Tài sản", items:[{id:"devices", label:"Thiết bị"},{id:"employees", label:"Nhân viên"}]},
  {grp:"Nghiệp vụ", class:"admin-only", items:[{id:"ops", label:"Làm Biên Bản"}]},
  {grp:"Theo dõi", items:[{id:"finance", label:"Tài chính & Khấu hao"}]},
  {grp:"Hệ thống", class:"admin-only", items:[{id:"import", label:"Nhập File Excel (CSV)"},{id:"accounts", label:"Quản lý Tài khoản"},{id:"settings", label:"Cài đặt"}]}
];
function renderNav(){ document.getElementById("mainNav").innerHTML = NAV.map(g => `<div class="grp-label ${g.class||''}">${g.grp}</div>${g.items.map(it => `<button class="${state.view===it.id?'active':''} ${g.class||''}" onclick="app.setView('${it.id}')">${it.label}</button>`).join("")}`).join(""); }
function setView(view, arg){ state.view=view; renderNav(); document.getElementById("topbarActions").innerHTML=""; window.scrollTo(0,0);
  if(view==="dashboard") renderDashboard(); else if(view==="devices") renderDevices(); else if(view==="device") renderDeviceDetail(arg);
  else if(view==="employees") renderEmployees(); else if(view==="ops") renderOps(); else if(view==="finance") renderFinance();
  else if(view==="accounts") renderAccounts(); else if(view==="settings") renderSettings(); else if(view==="import") renderImport();
}

/* --- DASHBOARD & LISTS --- */
function renderDashboard(){
  document.getElementById("pageTitle").textContent="Dashboard";
  document.getElementById("content").innerHTML=`<div class="grid-stats"><div class="stat-card"><div class="n">${state.devices.length}</div>Tổng thiết bị</div></div>`;
}
function renderDevices(){
  document.getElementById("pageTitle").textContent="Danh sách Thiết bị";
  document.getElementById("topbarActions").innerHTML=`<button class="btn btn-brand" onclick="app.openDeviceForm()">+ Thêm thiết bị</button>`;
  document.getElementById("content").innerHTML=`<div class="panel"><table class="data"><tr><th>Mã TB</th><th>Loại/Hiệu</th><th>Tình trạng</th><th>Trạng thái</th><th>Đang giữ</th></tr>${state.devices.map(d=>`<tr onclick="app.setView('device','${d.id}')"><td><b>${d.id}</b></td><td>${esc(d.type)} - ${esc(d.brand)}</td><td>${esc(d.condition)}</td><td><span class="pill ${STATUS_META[d.status]?.pill}">${esc(d.status)}</span></td><td>${esc(d.holderName||"Kho")}</td></tr>`).join("")}</table></div>`;
}
function renderDeviceDetail(id){
  const d = state.devices.find(x=>x.id===id); document.getElementById("pageTitle").textContent=`Chi tiết ${id}`;
  document.getElementById("topbarActions").innerHTML=`<button class="btn" onclick="app.setView('devices')">Quay lại</button><button class="btn btn-brand" onclick="app.openDeviceForm('${id}')">Sửa thông tin</button>`;
  document.getElementById("content").innerHTML=`<div class="panel"><h3>${esc(d.type)} ${esc(d.brand)}</h3><p>Tình trạng: ${esc(d.condition)} | Trạng thái: <b>${esc(d.status)}</b></p><p>Giá mua: <b>${fmtVND(d.purchasePrice)}</b> | Ngày mua: ${d.purchaseDate||"Chưa nhập"}</p><p>Người dùng hiện tại: ${esc(d.holderName||"Trống")}</p></div>`;
}
function renderEmployees(){
  document.getElementById("pageTitle").textContent="Danh sách Nhân viên";
  document.getElementById("topbarActions").innerHTML=`<button class="btn btn-brand admin-only" onclick="app.openEmployeeForm()">+ Thêm NV</button>`;
  document.getElementById("content").innerHTML=`<div class="panel"><table class="data"><tr><th>Mã NV</th><th>Họ tên</th><th>Bộ phận</th></tr>${state.employees.map(e=>`<tr><td>${e.id}</td><td>${esc(e.name)}</td><td>${esc(e.dept)}</td></tr>`).join("")}</table></div>`;
}

/* --- NGHIỆP VỤ & BIÊN BẢN (KHÔI PHỤC) --- */
function renderOps(){
  document.getElementById("pageTitle").textContent="Nghiệp vụ / Lập Biên Bản";
  document.getElementById("content").innerHTML=`
    <div class="tiles">
      <div class="tile" onclick="app.openOpForm('ban_giao')"><h3>Bàn giao (Kho -> User)</h3><p>Cấp máy mới cho nhân viên</p></div>
      <div class="tile" onclick="app.openOpForm('thu_hoi')"><h3>Thu hồi (User -> Kho)</h3><p>Trả máy về kho IT</p></div>
      <div class="tile" onclick="app.openOpForm('dieu_chuyen')"><h3>Điều chuyển (User -> User)</h3><p>Chuyển máy giữa 2 người</p></div>
      <div class="tile" onclick="app.openOpForm('sua_chua')"><h3>Ghi nhận Sửa chữa</h3><p>Cập nhật chi phí sửa</p></div>
    </div>`;
}
const OP_META = { ban_giao:{title:"Biên bản bàn giao", s:"Trong kho"}, thu_hoi:{title:"Biên bản thu hồi", s:"Đang sử dụng"}, dieu_chuyen:{title:"Điều chuyển", s:"Đang sử dụng"}, sua_chua:{title:"Sửa chữa", s:null} };
function openOpForm(op){
  const meta = OP_META[op]; const devices = op==="sua_chua" ? state.devices : state.devices.filter(d=>d.status===meta.s);
  let extra = "";
  if(op==="ban_giao" || op==="dieu_chuyen") extra = `<div class="field"><label>Giao cho (Người nhận)</label><select id="opEmp">${state.employees.map(e=>`<option value="${e.id}">${e.name} (${e.dept})</option>`).join("")}</select></div>`;
  else if(op==="sua_chua") extra = `<div class="field"><label>Chi phí (VNĐ)</label><input type="number" id="opCost" value="0"></div>`;
  openModal(meta.title, `<div class="field"><label>Chọn Thiết bị</label><select id="opDev"><option value="">--Chọn--</option>${devices.map(d=>`<option value="${d.id}">${d.id} - ${d.type}</option>`).join("")}</select></div>${extra}<div class="field"><label>Ghi chú / Lý do</label><input id="opNote"></div>`, `<button class="btn btn-brand" onclick="app.submitOp('${op}')">Lưu & In</button>`);
}
async function submitOp(op){
  const devId = document.getElementById("opDev").value; if(!devId) return alert("Chọn thiết bị!");
  const d = state.devices.find(x=>x.id===devId); const note = document.getElementById("opNote").value;
  if(op==="ban_giao" || op==="dieu_chuyen"){
    const emp = state.employees.find(e=>e.id===document.getElementById("opEmp").value);
    d.status="Đang sử dụng"; d.holderId=emp.id; d.holderName=emp.name; d.dept=emp.dept;
  } else if(op==="thu_hoi"){
    d.status="Trong kho"; d.holderId=null; d.holderName=null; d.dept="";
  } else if(op==="sua_chua"){
    d.repairs = d.repairs||[]; d.repairs.push({date:new Date().toISOString(), cost:Number(document.getElementById("opCost").value), note});
  }
  await persistDevices(); closeModal();
  document.getElementById("print-area").innerHTML = `<div style="padding:20px;font-family:sans-serif;"><h2>${OP_META[op].title.toUpperCase()} - CÔNG TY JEANIC</h2><p>Mã TB: ${d.id}</p><p>Loại: ${d.type} ${d.brand}</p><p>Ghi chú: ${note}</p><br><br><b>KÝ TÊN</b></div>`;
  setTimeout(()=>window.print(), 200); setView("devices");
}

/* --- TÀI CHÍNH & CÀI ĐẶT --- */
function renderFinance(){
  document.getElementById("pageTitle").textContent="Tài chính & Khấu hao";
  let ti=0, tr=0; state.devices.forEach(d=>{ ti+=Number(d.purchasePrice)||0; tr+=(d.repairs||[]).reduce((s,r)=>s+(Number(r.cost)||0),0); });
  document.getElementById("content").innerHTML=`<div class="grid-stats"><div class="stat-card">Tổng nguyên giá<div class="n">${fmtVND(ti)}</div></div><div class="stat-card">Tổng phí sửa<div class="n" style="color:red">${fmtVND(tr)}</div></div></div>`;
}
function renderSettings(){
  document.getElementById("pageTitle").textContent="Cài đặt Hệ thống";
  document.getElementById("content").innerHTML=`<div class="panel"><h3>Thông số khấu hao</h3><div class="field"><label>Thời gian khấu hao mặc định (Năm)</label><input type="number" id="sLife" value="${state.settings.usefulLifeYears}"></div><button class="btn btn-brand" onclick="app.saveSettings()">Lưu cài đặt</button></div>`;
}
async function saveSettings(){ state.settings.usefulLifeYears = Number(document.getElementById("sLife").value); await persistSettings(); alert("Đã lưu!"); }

/* --- FORMS (THÊM/SỬA) --- */
function openDeviceForm(id){
  const d = id?state.devices.find(x=>x.id===id):null; const isEdit=!!d;
  openModal(isEdit?`Sửa ${id}`:"Thêm Thiết bị", `
    <div class="field"><label>Mã TB</label><input value="${isEdit?d.id:nextDeviceId()}" disabled></div>
    <div class="field-row"><div class="field"><label>Loại</label><input id="fType" value="${d?.type||""}"></div><div class="field"><label>Hiệu</label><input id="fBrand" value="${d?.brand||""}"></div></div>
    <div class="field-row"><div class="field"><label>Giá mua (VND)</label><input type="number" id="fPrice" value="${d?.purchasePrice||""}"></div><div class="field"><label>Ngày mua</label><input type="date" id="fDate" value="${d?.purchaseDate||""}"></div></div>
    <div class="field"><label>Ghi chú</label><input id="fNote" value="${d?.note||""}"></div>
  `, `<button class="btn btn-brand" onclick="app.saveDevice(${isEdit?`'${id}'`:'null'})">Lưu</button>`);
}
async function saveDevice(id){
  if(id){ const d=state.devices.find(x=>x.id===id); d.type=document.getElementById("fType").value; d.brand=document.getElementById("fBrand").value; d.purchasePrice=Number(document.getElementById("fPrice").value); d.purchaseDate=document.getElementById("fDate").value; }
  else { state.devices.push({ id:nextDeviceId(), type:document.getElementById("fType").value, brand:document.getElementById("fBrand").value, purchasePrice:Number(document.getElementById("fPrice").value), purchaseDate:document.getElementById("fDate").value, status:"Trong kho", condition:"Mới" }); state.meta.deviceSeq++; await persistMeta(); }
  await persistDevices(); closeModal(); setView("devices");
}
function openEmployeeForm(){
  openModal("Thêm NV", `<div class="field"><label>Họ tên</label><input id="eName"></div><div class="field"><label>Bộ phận</label><input id="eDept"></div>`, `<button class="btn btn-brand" onclick="app.saveEmployee()">Lưu</button>`);
}
async function saveEmployee(){
  state.employees.push({ id:nextEmployeeId(), name:document.getElementById("eName").value, dept:document.getElementById("eDept").value });
  state.meta.employeeSeq++; await persistMeta(); await persistEmployees(); closeModal(); setView("employees");
}

/* --- TÍNH NĂNG MỚI: IMPORT EXCEL (CSV) --- */
function renderImport(){
  document.getElementById("pageTitle").textContent="Nhập dữ liệu hàng loạt từ Excel/CSV";
  document.getElementById("content").innerHTML=`
    <div class="panel">
      <h3>1. Import Danh Sách Thiết Bị</h3>
      <p style="font-size:12px;color:var(--ink-soft)">Chọn file <b>DS Thiết bị.csv</b> (Phải có các cột: Mã TB, Loại thiết bị, Thương hiệu, ...)</p>
      <input type="file" id="fileDev" accept=".csv" style="margin-bottom:10px;">
      <button class="btn btn-brand" onclick="app.importCSV('devices')">Bắt đầu Import TB</button>
    </div>
    <div class="panel">
      <h3>2. Import Danh Sách Nhân Viên</h3>
      <p style="font-size:12px;color:var(--ink-soft)">Chọn file <b>DS Nhân viên.csv</b> (Phải có các cột: Mã NV, Họ và tên, Bộ phận, ...)</p>
      <input type="file" id="fileEmp" accept=".csv" style="margin-bottom:10px;">
      <button class="btn btn-brand" onclick="app.importCSV('employees')">Bắt đầu Import NV</button>
    </div>
  `;
}
function importCSV(type) {
  const fileInput = document.getElementById(type === 'devices' ? 'fileDev' : 'fileEmp');
  if (!fileInput.files.length) return alert("Vui lòng chọn file CSV trước!");
  
  Papa.parse(fileInput.files[0], {
    header: true, skipEmptyLines: true,
    complete: async function(results) {
      const data = results.data; let importedCount = 0;
      if (type === 'devices') {
        data.forEach(row => {
          if (!row["Mã TB"]) return;
          // Kiểm tra xem mã TB đã tồn tại chưa, nếu chưa thì thêm mới
          if (!state.devices.find(d => d.id === row["Mã TB"])) {
            state.devices.push({
              id: row["Mã TB"], type: row["Loại thiết bị"]||"", brand: row["Thương hiệu"]||"",
              specs: row["Thông số kỹ thuật"]||"", condition: row["Tình trạng"]||"Mới",
              status: row["Trạng thái sử dụng"]||"Trong kho", holderName: row["Người đang sử dụng"]||"",
              dept: row["Bộ phận"]||"", purchaseDate: row["Ngày nhập kho"]||"", note: row["Ghi chú"]||""
            });
            importedCount++;
            // Cập nhật Sequence sinh mã tự động
            const num = parseInt(row["Mã TB"].replace("TB", ""));
            if (!isNaN(num) && num >= state.meta.deviceSeq) state.meta.deviceSeq = num + 1;
          }
        });
        await persistDevices(); await persistMeta();
      } else {
        data.forEach(row => {
          if (!row["Mã NV"]) return;
          if (!state.employees.find(e => e.id === row["Mã NV"])) {
            state.employees.push({
              id: row["Mã NV"], name: row["Họ và tên"]||"", dept: row["Bộ phận"]||"",
              position: row["Chức vụ"]||"", email: row["Email"]||"", phone: row["Số điện thoại"]||"", status: row["Trạng thái"]||"Đang làm việc"
            });
            importedCount++;
            const num = parseInt(row["Mã NV"].replace("NV", ""));
            if (!isNaN(num) && num >= state.meta.employeeSeq) state.meta.employeeSeq = num + 1;
          }
        });
        await persistEmployees(); await persistMeta();
      }
      alert(`Đã import thành công ${importedCount} dòng dữ liệu mới!`); fileInput.value = "";
    }
  });
}

function openModal(t, b, f){ document.getElementById("modalBox").innerHTML=`<div class="modal-head"><h3>${t}</h3></div><div class="modal-body">${b}</div><div class="modal-foot"><button class="btn" onclick="app.closeModal()" style="margin-right:10px">Huỷ</button>${f}</div>`; document.getElementById("modal-root").classList.add("open"); }
function closeModal(){ document.getElementById("modal-root").classList.remove("open"); }
window.app = { login, logout, setView, closeModal, openDeviceForm, saveDevice, openEmployeeForm, saveEmployee, openOpForm, submitOp, createAcc, saveSettings, importCSV };
</script>
